apiVersion: apps/v1
kind: Deployment
metadata:
  name: teedy-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teedy
  template:
    metadata:
      labels:
        app: teedy
    spec:
      containers:
        - name: teedy
          image: your-dockerhub-id/teedy:v1.0
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: teedy-service
spec:
  type: NodePort
  selector:
    app: teedy
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
